<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Mini Player</title>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

input{
width:400px;
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
background:#2563eb;
color:white;
}

#player{
margin-top:30px;
position:relative;
display:inline-block;
}

iframe{
width:800px;
height:450px;
border-radius:15px;
}

.mini{
position:fixed;
width:320px;
height:180px;
bottom:30px;
right:30px;
cursor:move;
z-index:999;
}

.mini iframe{
width:100%;
height:100%;
}

</style>

</head>

<body>

<h2>YouTube Mini Player</h2>

<input id="url" placeholder="วางลิงก์ YouTube">

<br><br>

<button onclick="play()">เล่น</button>
<button onclick="mini()">Mini Player</button>
<button onclick="pip()">ลอยนอกจอ</button>

<div id="player"></div>

<script>

let drag=false
let offsetX=0
let offsetY=0

const player=document.getElementById("player")

function getID(url){

if(url.includes("watch?v=")){
return url.split("v=")[1].split("&")[0]
}

if(url.includes("youtu.be/")){
return url.split("youtu.be/")[1]
}

return url

}

function play(){

let url=document.getElementById("url").value
let id=getID(url)

player.innerHTML=
`<iframe id="video" src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`

}

function mini(){
player.classList.toggle("mini")
}

function pip(){

let iframe=document.getElementById("video")

if(iframe){
iframe.requestPictureInPicture?.()
}

}

document.addEventListener("mousedown",function(e){

if(player.classList.contains("mini")){

drag=true
offsetX=e.clientX-player.offsetLeft
offsetY=e.clientY-player.offsetTop

}

})

document.addEventListener("mousemove",function(e){

if(drag){

player.style.left=e.clientX-offsetX+"px"
player.style.top=e.clientY-offsetY+"px"

}

})

document.addEventListener("mouseup",function(){
drag=false
})

</script>

</body>
</html>
